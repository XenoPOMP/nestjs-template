name: 'CI Pipeline'
on:
  push:
    branches:
      - main
      - canary

  pull_request:
    branches:
      - main

jobs:
  # Install Node.js and dependencies
  ci:
    strategy:
      matrix:
        NODE_VERSION:
          - '22'
          - '24'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: testing-db
          POSTGRES_USER: rt
          POSTGRES_PASSWORD: pwd
        ports:
          - 5432:5432
        # Health check to ensure Postgres is ready before steps run
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: '🧩 Install Node (${{ matrix.NODE_VERSION }})'
        uses: actions/setup-node@v4
        with:
          node-version: '${{ matrix.NODE_VERSION }}'

      - name: '📦 Install dependencies'
        run: yarn install --frozen-lockfile

      - name: '📕 Linting'
        run: yarn ci:lint

      # Start to run our inline jobs
      # Test
      - name: '🧪 Running tests'
        run: yarn ci:test
        env:
          DATABASE_URL: postgresql://rt:pwd@localhost:5432/testing-db?schema=public